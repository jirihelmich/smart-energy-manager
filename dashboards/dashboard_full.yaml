      # ── Section 7: BMS Capacity ────────────────────────────────────────
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: BMS Battery Capacity (90d)
              show_states: true
              colorize_states: true
            graph_span: 90d
            span:
              end: day
            yaxis:
              - id: kwh
                apex_config:
                  title:
                    text: kWh
            series:
              - entity: sensor.smart_energy_manager_bms_battery_capacity
                name: Capacity
                type: line
                color: "#9c27b0"
                stroke_width: 2
                yaxis_id: kwh
                float_precision: 2
                statistics:
                  type: max
                  period: day
                show:
                  in_header: raw
            grid_options:
              columns: 12

      # ── Section 8: Charging Cost & Savings ─────────────────────────────
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Charging Cost & Savings (30d)
              show_states: true
              colorize_states: true
            graph_span: 30d
            span:
              end: day
            yaxis:
              - id: cost
                min: 0
                apex_config:
                  title:
                    text: cost
            series:
              - entity: sensor.smart_energy_manager_weekly_charging_cost
                name: Weekly Cost
                type: line
                color: "#e91e63"
                stroke_width: 2
                yaxis_id: cost
                float_precision: 1
                statistics:
                  type: max
                  period: day
                show:
                  in_header: raw
              - entity: sensor.smart_energy_manager_charging_savings
                name: Weekly Savings
                type: line
                color: "#4caf50"
                stroke_width: 2
