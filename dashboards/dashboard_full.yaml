  # ═══════════════════════════════════════════════════════════════════════
  #  View 3: Surplus Load Management
  # ═══════════════════════════════════════════════════════════════════════
  - type: sections
    title: Surplus
    cards: []
    max_columns: 3
    sections:
      # ── Col 1: Status & Controls ──────────────────────────────────────
      - type: grid
        cards:
          - type: custom:gauge-card-pro
            entity: sensor.solax_inverter_pv_power_total
            entity2: sensor.solax_inverter_grid_export
            needle: true
            gradient: true
            round: full
            min: 0
            max: 10000
            titles:
              primary: PV / Export
              primary_font_size: 14px
            inner:
              min: 0
              max: 4500
              mode: severity
              round: full
              segments:
                - from: 0
                  color: '#8bc34a'
                - from: 1000
                  color: '#43a047'
                - from: 2000
                  color: '#fdd835'
                - from: 3000
                  color: '#fb8c00'
                - from: 4000
                  color: '#e53935'
            setpoint:
              value: 4500
              color: '#e53935'
              label: true
            segments:
              - from: 0
                color: '#e0e0e0'
              - from: 500
                color: '#e53935'
              - from: 2000
                color: '#fb8c00'
              - from: 4000
                color: '#fdd835'
              - from: 6000
                color: '#8bc34a'
              - from: 8000
                color: '#43a047'
            grid_options:
              columns: 12
          - type: markdown
            title: Load Details
            content: >-
              {% set details =
              state_attr('sensor.smart_energy_manager_surplus_load_status',
              'load_details') or [] %}
              {% if details | length == 0 %}
              *No surplus loads configured.*
              Go to Settings → Devices → Smart Battery Charging → Configure →
              Surplus Load Management to add loads.
              {% else %}
              <table width="100%" cellspacing="0" cellpadding="8">
              <tr><th align="left">Load</th><th>Power</th><th>Mode</th><th>Status</th><th>Today</th></tr>
              {%- for d in details %}
              <tr><td align="left">{{ d.name }}</td><td>{% if d.actual_power_kw is not none %}{{ d.actual_power_kw }}{% else %}{{ d.power_kw }}{% endif %} kW</td><td>{{ d.mode | title }}</td><td>{% if d.is_device_on and d.controlled_by_automation %}🟢 Auto{% elif d.is_device_on %}🟡 Manual{% else %}⚪ OFF{% endif %}</td><td>{{ d.energy_today_kwh }} kWh</td></tr>
              {%- endfor %}
              </table>
              {% endif %}
            grid_options:
              columns: 12
          - type: custom:apexcharts-card
            chart_type: donut
            header:
              title: Surplus Forecast
              show: true
              show_states: true
              colorize_states: true
            apex_config:
              legend:
                show: false
              dataLabels:
                enabled: true
                dropShadow:
                  enabled: false
                formatter: |
                  EVAL:function(val, opts) {
                    var v = opts.w.config.series[opts.seriesIndex];
                    return v > 0 ? v.toFixed(1) : '';
                  }
              plotOptions:
                pie:
                  donut:
                    size: '60%'
                    labels:
                      show: true
                      total:
                        show: true
                        label: Solar
                        formatter: |
                          EVAL:function(w) {
                            return w.globals.seriesTotals.reduce((a, b) => a + b, 0).toFixed(1) + ' kWh';
                          }
              chart:
                height: 220
            series:
              - entity: sensor.smart_energy_manager_surplus_forecast
                attribute: chart_consumption
                name: Consumption
                color: '#1565c0'
              - entity: sensor.smart_energy_manager_surplus_forecast
                attribute: chart_battery
                name: Battery
                color: '#f9a825'
              - entity: sensor.smart_energy_manager_surplus_forecast
                attribute: chart_surplus
                name: Surplus
                color: '#2e7d32'
            grid_options:
              columns: 12
          - type: markdown
            content: >-
              {% set surplus = states('sensor.smart_energy_manager_surplus_forecast') | float(0) %}
              {% set hours = state_attr('sensor.smart_energy_manager_surplus_forecast', 'surplus_hours') | int(0) %}
              {% set full_hour = state_attr('sensor.smart_energy_manager_surplus_forecast', 'battery_full_hour') %}
              {% set runtimes = state_attr('sensor.smart_energy_manager_surplus_forecast', 'predicted_runtimes') or {} %}
              {% set day = state_attr('sensor.smart_energy_manager_surplus_forecast', 'forecast_day') or 'today' %}
              {% if surplus > 0 %}
              ⚡ **{{ surplus | round(1) }} kWh** surplus over **{{ hours }}**h{% if full_hour is not none %} (battery full at {{ full_hour }}:00){% endif %}{% if runtimes | length > 0 %} · {% for name, h in runtimes.items() %}{% if h > 0 %}**{{ name }}** ~{{ h }}h{% if not loop.last %} · {% endif %}{% endif %}{% endfor %}{% endif %}
              {% else %}
              *No surplus expected {{ "tomorrow" if day == "tomorrow" else "today" }}*
              {% endif %}
            grid_options:
              columns: 12
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.smart_energy_manager_surplus_load_status
                attribute: active_loads
                above: 0
            card:
              type: glance
              title: Current Surplus
              columns: 3
              show_state: true
              entities:
                - entity: sensor.smart_energy_manager_surplus_load_status
                  attribute: true_surplus_kw
                  name: True Surplus
                  icon: mdi:solar-power
                - entity: sensor.smart_energy_manager_surplus_load_status
                  attribute: total_power_kw
                  name: Load Power
                  icon: mdi:flash
                - entity: sensor.smart_energy_manager_surplus_load_status
                  attribute: grid_export_kw
                  name: Grid Export
                  icon: mdi:transmission-tower-export
            grid_options:
              columns: 12
      # ── Col 2: Real-time Charts ───────────────────────────────────────
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Live Power Draw
              show_states: true
            graph_span: 24h
            span:
              start: day
            now:
              show: true
              label: Now
            apex_config:
              chart:
                height: 280px
              yaxis:
                - title:
                    text: kW
                  decimalsInFloat: 1
                  min: 0
            series:
              - entity: sensor.solax_inverter_pv_power_total
                name: Solar
                type: area
                color: "#ffc107"
                stroke_width: 1
                opacity: 0.12
                unit: " kW"
                float_precision: 2
                group_by:
                  func: avg
                  duration: 5min
                transform: "return x / 1000;"
              - entity: sensor.solax_inverter_grid_export
                name: Grid Export
                type: line
                color: "#4caf50"
                stroke_width: 2
                opacity: 1
                unit: " kW"
                float_precision: 2
                group_by:
                  func: avg
                  duration: 5min
                transform: "return x / 1000;"
              - entity: sensor.water_heater_power
                name: Water Heater
                type: area
                color: "#ff6b6b"
                stroke_width: 1
                opacity: 0.4
                unit: " kW"
                float_precision: 2
                group_by:
                  func: avg
                  duration: 5min
                transform: "return x / 1000;"
              - entity: sensor.power_meter_floor_heating_upstairs_power_2
                name: Floor Upstairs
                type: area
                color: "#4ecdc4"
                stroke_width: 1
                opacity: 0.4
                unit: " kW"
                float_precision: 2
                group_by:
                  func: avg
                  duration: 5min
                transform: "return x / 1000;"
              - entity: sensor.shelly3em63g3_b08184e0d6c0_energy_meter_2_power
                name: Floor Downstairs
                type: area
                color: "#ab47bc"
                stroke_width: 1
                opacity: 0.4
                unit: " kW"
                float_precision: 2
                group_by:
                  func: avg
                  duration: 5min
                transform: "return x / 1000;"
            grid_options:
              columns: 12
          - type: custom:apexcharts-card
            header:
              show: true
              title: Battery SOC
              show_states: true
              colorize_states: true
            graph_span: 24h
            apex_config:
              chart:
                height: 180px
            span:
              start: day
            now:
              show: true
              label: Now
            yaxis:
              - id: pct
                min: 0
                max: 100
                apex_config:
                  title:
                    text: "%"
            series:
              - entity: sensor.solax_inverter_battery_capacity
                name: SOC
                type: area
                color: "#2196f3"
                stroke_width: 2
                opacity: 0.2
                yaxis_id: pct
                group_by:
                  func: avg
                  duration: 15min
                show:
                  in_header: raw
                float_precision: 0
            grid_options:
              columns: 12
      # ── Col 3: Runtime History ────────────────────────────────────────
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Surplus Energy by Load
              show_states: false
            graph_span: 7d
            span:
              end: day
            apex_config:
              chart:
                height: 250
                stacked: true
              yaxis:
                - title:
                    text: kWh
                  decimalsInFloat: 1
              xaxis:
                labels:
                  format: dd MMM
              legend:
                show: true
                position: bottom
            series:
              - entity: sensor.smart_energy_manager_surplus_load_status
                name: Water Heater
                type: column
                color: "#e53935"
                float_precision: 1
                data_generator: >
                  const history =
                  entity.attributes.runtime_history || [];

                  return history.map(entry => {
                    const energy = entry.energy_kwh || {};
                    return [new Date(entry.date).getTime(), energy['Water Heater'] || 0];
                  }).reverse();
              - entity: sensor.smart_energy_manager_surplus_load_status
                name: Floor Upstairs
                type: column
                color: "#fb8c00"
                float_precision: 1
                data_generator: >
                  const history =
                  entity.attributes.runtime_history || [];

                  return history.map(entry => {
                    const energy = entry.energy_kwh || {};
                    return [new Date(entry.date).getTime(), energy['Floor Upstairs'] || 0];
                  }).reverse();
              - entity: sensor.smart_energy_manager_surplus_load_status
                name: Floor Downstairs
                type: column
                color: "#43a047"
                float_precision: 1
                data_generator: >
                  const history =
                  entity.attributes.runtime_history || [];

                  return history.map(entry => {
                    const energy = entry.energy_kwh || {};
                    return [new Date(entry.date).getTime(), energy['Floor Downstairs'] || 0];
                  }).reverse();
            grid_options:
              columns: 12
          - type: markdown
            title: Utilization Efficiency
            content: >-
              {% set factors =
              state_attr('sensor.smart_energy_manager_surplus_load_status',
              'utilization_factors') or {} %}
              {% set history =
              state_attr('sensor.smart_energy_manager_surplus_load_status',
              'runtime_history') or [] %}
              {% set valid = history | selectattr('surplus_hours', 'gt', 0) | list %}
              {% if factors | length == 0 %}
              *No historical data yet.* Utilization will appear after the first
              full day with surplus.
              {% else %}
              <table width="100%" cellspacing="0" cellpadding="8">
              <tr><th align="left">Load</th><th>Avg Runtime</th><th>Avg Energy</th><th>Utilization</th></tr>
              {%- for name, factor in factors.items() %}
              {%- set ns = namespace(hours=0, kwh=0) %}
              {%- for entry in valid %}
              {%- set ns.hours = ns.hours + (entry.loads or {}).get(name, 0) %}
              {%- set ns.kwh = ns.kwh + (entry.energy_kwh or {}).get(name, 0) %}
              {%- endfor %}
              {%- set days = valid | length %}
              <tr><td align="left">{{ name }}</td><td>{{ (ns.hours / days) | round(1) }}h</td><td>{{ (ns.kwh / days) | round(1) }} kWh</td><td>{{ (factor * 100) | round(0) }}%</td></tr>
              {%- endfor %}
              <tr><td colspan="4" align="center"><small>Avg per day over last {{ valid | length }} day(s) with surplus.</small></td></tr>
              </table>
              {% endif %}
            grid_options:
              columns: 12
          - type: custom:apexcharts-card
            header:
              show: true
              title: Solar Production vs Export (7d)
              show_states: true
              colorize_states: true
            graph_span: 7d
            span:
              end: day
            yaxis:
              - id: kwh
                min: ~0
                apex_config:
                  title:
                    text: kWh
            series:
              - entity: sensor.solax_inverter_today_s_solar_energy
                name: Solar
                type: column
                color: "#ffc107"
                yaxis_id: kwh
                float_precision: 1
                group_by:
                  func: max
                  duration: 1d
                show:
                  in_header: raw
              - entity: sensor.solax_energy_dashboard_solax_grid_export_energy
                name: Grid Export
                type: column
                color: "#8bc34a"
                yaxis_id: kwh
                float_precision: 1
                group_by:
                  func: max
                  duration: 1d
                show:
                  in_header: raw
            grid_options:
              columns: 12
              rows: 3
