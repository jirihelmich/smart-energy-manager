          - type: custom:gauge-card-pro
            entity: sensor.smart_energy_manager_grid_dependency
            needle: true
            gradient: true
            round: full
            min: 0
            max: 100
            titles:
              primary: Grid Dependency
              primary_font_size: 14px
            segments:
              - from: 0
                color: '#43a047'
              - from: 20
                color: '#8bc34a'
              - from: 40
                color: '#fdd835'
              - from: 60
                color: '#fb8c00'
              - from: 80
                color: '#e53935'
            grid_options:
              columns: 6
          - type: glance
            title: Charging Analytics
            columns: 3
            show_state: true
            show_name: true
            entities:
              - entity: sensor.smart_energy_manager_morning_soc
                name: Morning SOC
                icon: mdi:battery-clock
              - entity: sensor.smart_energy_manager_planned_vs_actual_charge
                name: Actual Charge
                icon: mdi:chart-bar
              - entity: sensor.smart_energy_manager_weekly_charging_cost
                name: Weekly Cost
              - entity: sensor.smart_energy_manager_charging_savings
